<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem DApp Example</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-top: 0;
        }
        .status {
            padding: 10px 15px;
            border-radius: 6px;
            margin: 20px 0;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        .account {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin: 10px 0;
            font-family: monospace;
            word-break: break-all;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        button.danger {
            background: #dc3545;
        }
        button.danger:hover {
            background: #c82333;
        }
        .transaction-form {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #dee2e6;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .balance {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
            margin: 20px 0;
        }
        .sign-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #dee2e6;
        }
        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
        }
        .result.success { background: #d4edda; color: #155724; }
        .result.error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Totem DApp Example</h1>
        <p>Demonstrates connecting to the Totem wallet extension using <code>@totemsdk/connect</code>.</p>

        <div id="status" class="status disconnected">
            Wallet not connected
        </div>

        <div id="wallet-info" style="display: none;">
            <h2>Wallet Information</h2>
            <div class="account">
                <strong>Address:</strong> <span id="address">-</span>
            </div>
        </div>

        <div id="connect-section">
            <button id="connect-btn">Connect Wallet</button>
        </div>

        <div id="disconnect-section" style="display: none;">
            <button id="disconnect-btn" class="danger">Disconnect</button>
        </div>

        <div class="sign-section" id="sign-section" style="display: none;">
            <h2>Verify Ownership</h2>
            <input type="text" id="sign-message" placeholder="Statement to verify" value="Hello from Totem DApp!" />
            <button id="sign-btn">Verify</button>
            <div id="sign-result"></div>
        </div>

        <div class="transaction-form" id="tx-form" style="display: none;">
            <h2>Send Transaction</h2>
            <input type="text" id="to-address" placeholder="Recipient Address (Mx...)" />
            <input type="number" id="amount" placeholder="Amount" min="0" step="0.000001" />
            <button id="send-btn">Send Transaction</button>
            <div id="tx-result"></div>
        </div>
    </div>

    <script type="module">
        import {
            connect,
            verify,
            getAccounts,
            sendTransaction,
            revokeTxPermission,
            isTotemInstalled,
            onEvent,
        } from '@totemsdk/connect';

        const ORIGIN = location.origin;

        let currentAddress = null;
        let unsubAccountsChanged = null;

        const statusEl = document.getElementById('status');
        const connectBtn = document.getElementById('connect-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const walletInfo = document.getElementById('wallet-info');
        const connectSection = document.getElementById('connect-section');
        const disconnectSection = document.getElementById('disconnect-section');
        const signSection = document.getElementById('sign-section');
        const txForm = document.getElementById('tx-form');
        const addressEl = document.getElementById('address');
        const signBtn = document.getElementById('sign-btn');
        const signResult = document.getElementById('sign-result');
        const sendBtn = document.getElementById('send-btn');
        const txResult = document.getElementById('tx-result');

        function showConnected(address) {
            currentAddress = address;
            statusEl.className = 'status connected';
            statusEl.textContent = 'Wallet connected';
            connectSection.style.display = 'none';
            disconnectSection.style.display = 'block';
            walletInfo.style.display = 'block';
            signSection.style.display = 'block';
            txForm.style.display = 'block';
            addressEl.textContent = address;
        }

        function showDisconnected() {
            currentAddress = null;
            statusEl.className = 'status disconnected';
            statusEl.textContent = 'Wallet not connected';
            connectSection.style.display = 'block';
            disconnectSection.style.display = 'none';
            walletInfo.style.display = 'none';
            signSection.style.display = 'none';
            txForm.style.display = 'none';
        }

        async function connectWallet() {
            try {
                if (!isTotemInstalled()) {
                    alert('Please install the Totem wallet extension.\nVisit https://totem.minima.global');
                    return;
                }

                const connectResponse = await connect(ORIGIN);
                const address = connectResponse.address;

                await verify(ORIGIN);

                showConnected(address);

                unsubAccountsChanged = onEvent('accountsChanged', handleAccountsChanged);

            } catch (error) {
                console.error('Connection failed:', error);
                alert('Failed to connect wallet: ' + error.message);
            }
        }

        async function disconnectWallet() {
            try {
                await revokeTxPermission(ORIGIN);
            } catch (_) {}

            if (unsubAccountsChanged) {
                unsubAccountsChanged();
                unsubAccountsChanged = null;
            }
            showDisconnected();
        }

        async function verifyMessage() {
            const statement = document.getElementById('sign-message').value;
            if (!statement) {
                alert('Please enter a statement to verify');
                return;
            }

            try {
                signBtn.disabled = true;
                signResult.innerHTML = 'Requesting verification...';

                const result = await verify(ORIGIN, { statement });

                signResult.innerHTML = `
                    <div class="result success">
                        <strong>Verification obtained!</strong><br><br>
                        <strong>Address:</strong><br>${result.address}<br><br>
                        <strong>Signature:</strong><br>${result.signature ? result.signature.substring(0, 80) + '...' : 'N/A'}
                    </div>
                `;
            } catch (error) {
                console.error('Verification failed:', error);
                signResult.innerHTML = `
                    <div class="result error">
                        Verification failed: ${error.message}
                    </div>
                `;
            } finally {
                signBtn.disabled = false;
            }
        }

        async function handleSend() {
            const toAddress = document.getElementById('to-address').value;
            const amount = document.getElementById('amount').value;

            if (!toAddress || !amount) {
                alert('Please fill in all fields');
                return;
            }

            try {
                sendBtn.disabled = true;
                txResult.innerHTML = 'Sending transaction...';

                const result = await sendTransaction(ORIGIN, {
                    version: 1,
                    outputs: [{
                        address: toAddress,
                        amount: amount,
                        tokenId: '0x00',
                    }],
                });

                txResult.innerHTML = `
                    <div class="result success">
                        Transaction sent successfully!<br>
                        TX ID: <code>${result.txId || JSON.stringify(result)}</code>
                    </div>
                `;

            } catch (error) {
                console.error('Transaction failed:', error);
                txResult.innerHTML = `
                    <div class="result error">
                        Transaction failed: ${error.message}
                    </div>
                `;
            } finally {
                sendBtn.disabled = false;
            }
        }

        function handleAccountsChanged(accounts) {
            if (!accounts || accounts.length === 0) {
                disconnectWallet();
            } else if (accounts[0] !== currentAddress) {
                showConnected(accounts[0]);
            }
        }

        connectBtn.addEventListener('click', connectWallet);
        disconnectBtn.addEventListener('click', disconnectWallet);
        signBtn.addEventListener('click', verifyMessage);
        sendBtn.addEventListener('click', handleSend);

        if (isTotemInstalled()) {
            getAccounts(ORIGIN).then(response => {
                if (response && response.accounts && response.accounts.length > 0) {
                    connectWallet();
                }
            }).catch(() => {});
        }
    </script>
</body>
</html>
