[package]
name = "edge-mqtt-wasm"
version = "0.1.0"
edition = "2021"
description = "Rust/WASM helpers for @totemsdk/edge-mqtt — canonicalization, topic matching, fixed-point arithmetic"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
sha3 = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
hex = "0.4"
js-sys = "0.3"
console_error_panic_hook = "0.1"

[profile.release]
opt-level = "s"
lto = true

[dev-dependencies]
wasm-bindgen-test = "0.3"
