[package]
name = "totemsdk-core-wasm"
version = "0.1.0"
edition = "2021"
description = "Quantum-resistant WOTS+ cryptographic engine for the Totem SDK — compiled to WASM"
license = "MIT"
authors = ["Totem SDK Contributors"]
repository = "https://github.com/MrGheek/totem-sdk"
homepage = "https://totem.ing"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
sha3 = "0.10"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
serde_json = "1"
zeroize = { version = "1", features = ["derive"] }
getrandom = { version = "0.2", features = ["js"] }
hex = "0.4"
console_error_panic_hook = "0.1"
js-sys = "0.3"
num-bigint = "0.4"
once_cell = "1"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
