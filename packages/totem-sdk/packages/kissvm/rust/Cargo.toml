[package]
name = "kissvm-wasm"
version = "0.1.0"
edition = "2021"
description = "KISSVM v1 evaluator for Minima scripting language — compiled to WASM"
license = "MIT"
authors = ["Totem SDK Contributors"]
repository = "https://github.com/MrGheek/totem-sdk"
homepage = "https://totem.ing"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
sha3 = "0.10"
sha2 = "0.10"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
serde_json = "1"
hex = "0.4"
num-bigint = "0.4"
num-traits = "0.2"
js-sys = "0.3"
console_error_panic_hook = "0.1"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
