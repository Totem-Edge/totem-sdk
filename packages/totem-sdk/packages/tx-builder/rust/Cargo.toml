[package]
name = "tx-builder-wasm"
version = "0.1.0"
edition = "2021"
description = "Transaction builder for Minima blockchain — coin selection, multisig, and WOTS signing (Rust/WASM)"
license = "MIT"
authors = ["Totem SDK Contributors"]
repository = "https://github.com/totem-sdk/totem-sdk"
homepage = "https://totem.ing"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
sha3 = "0.10"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
num-bigint = "0.4"
num-traits = "0.2"
hex = "0.4"
console_error_panic_hook = "0.1"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
