<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem</title>
    <style>
        body {
            width: 340px;
            height: 520px;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0b1220;
            color: white;
            font-family: system-ui, sans-serif;
        }
        #root {
            width: 100%;
            height: 100%;
        }
        /* Inline critical styles */
        .w-full { width: 100%; }
        .h-full { height: 100%; }
        .p-3 { padding: 12px; }
        .mb-2 { margin-bottom: 8px; }
        .mb-3 { margin-bottom: 12px; }
        .grid { display: grid; }
        .place-items-center { place-items: center; }
        .text-center { text-align: center; }
        .text-lg { font-size: 18px; }
        .font-bold { font-weight: 700; }
        .text-white { color: white; }
        .text-gray-400 { color: #9ca3af; }
        .mt-4 { margin-top: 16px; }
        .mt-1 { margin-top: 4px; }
        .text-sm { font-size: 14px; }
        .h-12 { height: 48px; }
        .w-12 { width: 48px; }
        .mx-auto { margin: 0 auto; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .gap-2 { gap: 8px; }
        .px-3 { padding-left: 12px; padding-right: 12px; }
        .pt-3 { padding-top: 12px; }
        .pb-2 { padding-bottom: 8px; }
        .h-7 { height: 28px; }
        .w-7 { width: 28px; }
        .rounded-lg { border-radius: 8px; }
        .text-base { font-size: 16px; }
        .font-semibold { font-weight: 600; }
        .tracking-wide { letter-spacing: 0.025em; }
        .opacity-80 { opacity: 0.8; }
        .logo-entrance { 
            animation: logoEntrance 0.8s ease-out;
            border-radius: 8px;
        }
        @keyframes logoEntrance { 
            0% { transform: scale(0.5) rotate(-180deg); opacity: 0; }
            50% { transform: scale(1.1) rotate(-90deg); opacity: 0.8; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Fallback content while JS loads -->
        <div style="width: 340px; height: 520px; display: grid; place-items: center; background: linear-gradient(135deg, #0f172a, #111827);">
            <div style="text-align: center; color: white;">
                <img src="/icons/logo.png" style="height: 48px; width: 48px; margin: 0 auto 16px; border-radius: 8px; display: block;" alt="Totem" />
                <div style="font-size: 18px; font-weight: 700;">Totem</div>
                <div style="font-size: 14px; color: #9ca3af; margin-top: 4px;">Loading...</div>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
