name: Rust Core CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/totem-sdk/packages/core-wasm/**'
      - '.github/workflows/rust-core.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/totem-sdk/packages/core-wasm/**'
      - '.github/workflows/rust-core.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: '-D warnings'

jobs:
  test:
    name: Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/totem-sdk/packages/core-wasm/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/totem-sdk/packages/core-wasm/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit tests
        working-directory: packages/totem-sdk/packages/core-wasm
        run: cargo test --lib

      - name: Run Java parity tests
        working-directory: packages/totem-sdk/packages/core-wasm
        run: cargo test --test java_parity

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/totem-sdk/packages/core-wasm/target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('packages/totem-sdk/packages/core-wasm/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-

      - name: Run Clippy
        working-directory: packages/totem-sdk/packages/core-wasm
        run: cargo clippy --all-targets -- -D warnings

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/totem-sdk/packages/core-wasm/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('packages/totem-sdk/packages/core-wasm/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build WASM (bundler target)
        working-directory: packages/totem-sdk/packages/core-wasm
        run: wasm-pack build --target bundler --out-dir pkg

      - name: Build WASM (nodejs target)
        working-directory: packages/totem-sdk/packages/core-wasm
        run: wasm-pack build --target nodejs --out-dir pkg-node

      - name: Check WASM size
        working-directory: packages/totem-sdk/packages/core-wasm
        run: |
          SIZE=$(wc -c < pkg/totemsdk_core_wasm_bg.wasm)
          echo "WASM size: ${SIZE} bytes"
          if [ "$SIZE" -gt 524288 ]; then
            echo "::warning::WASM binary exceeds 512KB (${SIZE} bytes)"
          fi

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg-${{ github.sha }}
          path: |
            packages/totem-sdk/packages/core-wasm/pkg/
            packages/totem-sdk/packages/core-wasm/pkg-node/
          retention-days: 7

  wasm-test:
    name: WASM Tests (Node.js)
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/totem-sdk/packages/core-wasm/target
          key: ${{ runner.os }}-cargo-wasm-test-${{ hashFiles('packages/totem-sdk/packages/core-wasm/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-test-

      - name: Run wasm-pack tests
        working-directory: packages/totem-sdk/packages/core-wasm
        run: wasm-pack test --node

  sdk-integration:
    name: SDK Integration Tests
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Build WASM
        working-directory: packages/totem-sdk/packages/core-wasm
        run: |
          wasm-pack build --target bundler --out-dir pkg
          wasm-pack build --target nodejs --out-dir pkg-node

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        working-directory: packages/totem-sdk/packages/core
        run: npx tsc

      - name: Run core tests
        working-directory: packages/totem-sdk/packages/core
        run: npx jest --passWithNoTests --no-coverage || true

      - name: Run wots-lease tests
        working-directory: packages/totem-sdk/packages/wots-lease
        run: npx jest --passWithNoTests --no-coverage || true

      - name: Run txpow tests
        working-directory: packages/totem-sdk/packages/txpow
        run: npx jest --passWithNoTests --no-coverage || true
