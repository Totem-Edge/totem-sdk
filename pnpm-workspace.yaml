packages:
  - packages/*
  - packages/**
  - TotemEdgeSDKDocs

  # Pear/Bare runtime packages are intentionally included:
  # - packages/totem-sdk/packages/pear
  # - packages/totem-pear-android-starter
  #
  # These packages depend on optional peers from the Hypercore ecosystem
  # (hyperswarm, hypercore, hyperdrive, corestore, bare-fs, bare-http1, etc.).
  # They were temporarily excluded in the past due to rocksdb-native / omnia-hyperswarm
  # resolution issues. Those issues are resolved; the packages are now part of the
  # full workspace surface for SDK and mobile Pear work.

onlyBuiltDependencies:
  - '@firebase/util'
  - '@tailwindcss/oxide'
  - bcrypt
  - better-sqlite3
  - core-js
  - core-js-pure
  - cpu-features
  - es5-ext
  - esbuild
  - msgpackr-extract
  - protobufjs
  - sharp
  - ssh2
  - unrs-resolver

